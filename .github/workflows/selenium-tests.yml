name: Selenium Automation Tests

# ── When to run ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]        # runs on every push to main
  pull_request:
    branches: [ main ]        # runs on every pull request
  workflow_dispatch:           # allows manual run from GitHub Actions tab

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  selenium-tests:
    runs-on: windows-latest   # runs on Windows (same as your machine)

    steps:

      # Step 1 — Checkout your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 — Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3 — Set up Chrome browser
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # Step 4 — Run your Selenium tests with Maven
      - name: Run Selenium Tests
        run: mvn test
        continue-on-error: true   # continue even if tests fail so report is generated

      # Step 5 — Upload TestNG HTML report as artifact
      - name: Upload TestNG Report
        uses: actions/upload-artifact@v4
        if: always()              # always upload report even if tests failed
        with:
          name: TestNG-Test-Report
          path: target/surefire-reports/
          retention-days: 30      # keep report for 30 days

      # Step 6 — Upload screenshots if any exist
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Screenshots
          path: screenshots/
          retention-days: 30